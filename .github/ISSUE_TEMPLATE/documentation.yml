name: Documentation issue
description: Report missing, incorrect, or confusing documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the latest README and documentation.
          required: true
        - label: I searched existing documentation issues.
          required: true

  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link the page or name the file and heading.
      placeholder: README.md — Model aliases
    validations:
      required: true

  - type: dropdown
    id: problem-type
    attributes:
      label: Problem type
      options:
        - Incorrect information
        - Missing information
        - Unclear instructions
        - Broken example
        - Broken link
        - Typo or formatting
        - New guide request
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Provide replacement wording or a better example when possible.
