name: Bug report
description: Report a reproducible problem in LLM Router
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve LLM Router. Search existing issues before submitting a new report.

        **Never include API keys, access tokens, provider credentials, private prompts, or customer data.**

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed all secrets and private data from logs and screenshots.
          required: true
        - label: This is a reproducible bug, not a support question or feature request.
          required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Provide the release version, tag, or commit SHA.
      placeholder: v0.6.0 or 1a2b3c4
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment environment
      options:
        - Local development
        - Vercel
        - Docker or container
        - Virtual machine or bare metal
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: v20.x or v22.x
    validations:
      required: true

  - type: dropdown
    id: api-format
    attributes:
      label: API or surface affected
      options:
        - OpenAI Chat Completions
        - OpenAI Responses
        - Anthropic Messages or Claude Code
        - Dashboard
        - Playground
        - Provider configuration
        - Routing, aliases, quotas, or reliability
        - Installation or CLI
        - Other
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Provider and model
      description: Leave blank when the issue is not provider-specific.
      placeholder: Gemini — gemini-2.5-flash

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and its impact.
      placeholder: Explain the observed behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Configure...
        2. Send...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Explain what should have happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove authorization headers, API keys, prompts, responses, cookies, and personal data.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Include relevant routing policies, alias configuration, or recent changes.
